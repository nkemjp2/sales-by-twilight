openapi: 3.0.3
info:
  title: Sales By Twilight API
  description: |
    Professional REST API for a grocery store e-commerce platform.
    
    ## Features
    - Full CRUD for Categories, Products, Customers, and Orders
    - Consistent JSON response format
    - Comprehensive filtering and sorting
    - Stock management with automatic inventory tracking
    - Order lifecycle with status workflow
    
    ## Response Format
    All responses follow a consistent structure:
    - Success: `{success: true, data: ..., message: "..."}`
    - Error: `{success: false, error: {code: "...", message: "..."}}`
    
  version: 1.0.0
  contact:
    name: Nkem
  license:
    name: MIT

servers:
  - url: http://127.0.0.1:5001
    description: Development server

tags:
  - name: Categories
    description: Product category management
  - name: Products
    description: Product catalogue management
  - name: Customers
    description: Customer account management
  - name: Orders
    description: Order processing and management

paths:
  # ============ CATEGORIES ============
  /categories:
    get:
      tags: [Categories]
      summary: List all categories
      parameters:
        - name: name
          in: query
          schema:
            type: string
          description: Filter by name (partial match)
        - name: sort
          in: query
          schema:
            type: string
            enum: [id, name, created_at, updated_at]
          description: Sort field
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
          description: Sort order
        - name: limit
          in: query
          schema:
            type: integer
          description: Maximum results
        - name: offset
          in: query
          schema:
            type: integer
          description: Skip results
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessListResponse'
    post:
      tags: [Categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /categories/{id}:
    get:
      tags: [Categories]
      summary: Get a category
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Categories]
      summary: Update a category
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdate'
      responses:
        '200':
          description: Category updated
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Categories]
      summary: Delete a category
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Category deleted
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ PRODUCTS ============
  /products:
    get:
      tags: [Products]
      summary: List all products
      parameters:
        - name: category_id
          in: query
          schema:
            type: integer
          description: Filter by category
        - name: name
          in: query
          schema:
            type: string
          description: Filter by name (partial match)
        - name: min_price
          in: query
          schema:
            type: number
          description: Minimum price
        - name: max_price
          in: query
          schema:
            type: number
          description: Maximum price
        - name: in_stock
          in: query
          schema:
            type: boolean
          description: Only products with stock > 0
        - name: sort
          in: query
          schema:
            type: string
            enum: [id, name, price, stock_quantity, created_at]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of products
    post:
      tags: [Products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '201':
          description: Product created
        '400':
          $ref: '#/components/responses/ValidationError'

  /products/{id}:
    get:
      tags: [Products]
      summary: Get a product
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Product details with category
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Products]
      summary: Update a product
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdate'
      responses:
        '200':
          description: Product updated
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Products]
      summary: Delete a product
      description: Cannot delete products that are part of existing orders.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Product deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Product is part of existing orders

  /products/{id}/stock:
    patch:
      tags: [Products]
      summary: Update stock quantity
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockUpdate'
      responses:
        '200':
          description: Stock updated
        '400':
          description: Invalid quantity or insufficient stock
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ CUSTOMERS ============
  /customers:
    get:
      tags: [Customers]
      summary: List all customers
      parameters:
        - name: email
          in: query
          schema:
            type: string
          description: Filter by email (exact match)
        - name: name
          in: query
          schema:
            type: string
          description: Filter by name (partial match)
        - name: sort
          in: query
          schema:
            type: string
            enum: [id, first_name, last_name, email, created_at]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of customers
    post:
      tags: [Customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreate'
      responses:
        '201':
          description: Customer created
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email already exists

  /customers/{id}:
    get:
      tags: [Customers]
      summary: Get a customer
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: include_orders
          in: query
          schema:
            type: boolean
          description: Include customer's orders
      responses:
        '200':
          description: Customer details
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Customers]
      summary: Update a customer
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerUpdate'
      responses:
        '200':
          description: Customer updated
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Email already exists
    delete:
      tags: [Customers]
      summary: Delete a customer
      description: Cannot delete customers with existing orders.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Customer deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Customer has existing orders

  /customers/{id}/orders:
    get:
      tags: [Customers]
      summary: Get customer's orders
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: sort
          in: query
          schema:
            type: string
            enum: [created_at, total_amount]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: List of customer's orders
        '404':
          $ref: '#/components/responses/NotFound'

  # ============ ORDERS ============
  /orders:
    get:
      tags: [Orders]
      summary: List all orders
      parameters:
        - name: customer_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: min_total
          in: query
          schema:
            type: number
        - name: max_total
          in: query
          schema:
            type: number
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: sort
          in: query
          schema:
            type: string
            enum: [id, total_amount, status, created_at]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of orders
    post:
      tags: [Orders]
      summary: Create an order
      description: |
        Creates a new order with items.
        - Stock is automatically decremented
        - Total is calculated from current product prices
        - Status is set to 'pending'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
      responses:
        '201':
          description: Order created
        '400':
          description: Validation error or insufficient stock
        '404':
          description: Customer or product not found

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get an order with items
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Order details with items
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Orders]
      summary: Delete an order
      description: |
        Deletes an order and restores stock.
        Cannot delete delivered orders.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Order deleted
        '400':
          description: Cannot delete delivered order
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{id}/status:
    patch:
      tags: [Orders]
      summary: Update order status
      description: |
        Valid transitions:
        - pending → processing, cancelled
        - processing → shipped, cancelled
        - shipped → delivered, cancelled
        
        Cancelling restores product stock.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusUpdate'
      responses:
        '200':
          description: Status updated
        '400':
          description: Invalid status transition
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{id}/items:
    get:
      tags: [Orders]
      summary: Get order items
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: List of order items
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Orders]
      summary: Add item to order
      description: Can only add items to pending orders.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderItemCreate'
      responses:
        '201':
          description: Item added
        '400':
          description: Order not modifiable or insufficient stock
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{id}/items/{item_id}:
    delete:
      tags: [Orders]
      summary: Remove item from order
      description: |
        Can only remove items from pending orders.
        Cannot remove the last item (delete the order instead).
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: item_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Item removed
        '400':
          description: Order not modifiable or last item
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        message:
          type: string

    SuccessListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object

    OrderStatus:
      type: string
      enum: [pending, processing, shipped, delivered, cancelled]

    CategoryCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 500

    ProductCreate:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        price:
          type: number
          minimum: 0.01
        stock_quantity:
          type: integer
          minimum: 0
          default: 0
        category_id:
          type: integer

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
          minimum: 0.01
        stock_quantity:
          type: integer
          minimum: 0
        category_id:
          type: integer

    StockUpdate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
        operation:
          type: string
          enum: [set, add, subtract]
          default: set

    CustomerCreate:
      type: object
      required: [first_name, last_name, email]
      properties:
        first_name:
          type: string
          maxLength: 50
        last_name:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
          maxLength: 100
        phone:
          type: string
          maxLength: 20

    CustomerUpdate:
      type: object
      properties:
        first_name:
          type: string
          maxLength: 50
        last_name:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
        phone:
          type: string

    OrderCreate:
      type: object
      required: [customer_id, items]
      properties:
        customer_id:
          type: integer
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [product_id, quantity]
            properties:
              product_id:
                type: integer
              quantity:
                type: integer
                minimum: 1

    StatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'

    OrderItemCreate:
      type: object
      required: [product_id, quantity]
      properties:
        product_id:
          type: integer
        quantity:
          type: integer
          minimum: 1
